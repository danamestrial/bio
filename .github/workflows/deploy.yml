name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # Astro 7 requires Node >= 22.12 (the action defaults to 20).
          node-version: 22
          # Pin to the pnpm that generated the lockfile. `pnpm@latest` enforces a
          # 24h minimumReleaseAge policy that rejects freshly-published deps
          # (astro@7.0.2, vite@8.1.0, …) and fails install.
          package-manager: pnpm@10.10.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
